<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Multiplication Table</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="page-container">
        <h1>Dynamic Multiplication Table</h1>

        <p class="intro">
            Enter a range of row and column values to generate a multiplication table.
            Values must be between -50 and 50.
        </p>

        <form id="tableForm">
            <div class="form-group">
                <label for="minCol">Minimum Column Value:</label>
                <input type="number" id="minCol" name="minCol" min="-50" max="50" required>
            </div>

            <div class="form-group">
                <label for="maxCol">Maximum Column Value:</label>
                <input type="number" id="maxCol" name="maxCol" min="-50" max="50" required>
            </div>

            <div class="form-group">
                <label for="minRow">Minimum Row Value:</label>
                <input type="number" id="minRow" name="minRow" min="-50" max="50" required>
            </div>

            <div class="form-group">
                <label for="maxRow">Maximum Row Value:</label>
                <input type="number" id="maxRow" name="maxRow" min="-50" max="50" required>
            </div>

            <button type="submit">Generate Table</button>
        </form>

        <div id="errorMessages"></div>

        <div id="tableContainer" class="table-container"></div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
